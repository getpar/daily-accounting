<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#1677ff"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f5ff"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角方形 -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>

  <!-- 笔记本页面 -->
  <rect x="140" y="100" width="280" height="330" rx="16" ry="16" fill="url(#page)" stroke="#d0d8e8" stroke-width="3"/>

  <!-- 装订线 -->
  <line x1="200" y1="100" x2="200" y2="430" stroke="#d0d8e8" stroke-width="2"/>

  <!-- 文字行 -->
  <rect x="220" y="150" width="160" height="10" rx="5" fill="#e0e6f0"/>
  <rect x="220" y="180" width="130" height="10" rx="5" fill="#e0e6f0"/>
  <rect x="220" y="210" width="150" height="10" rx="5" fill="#e0e6f0"/>
  <rect x="220" y="240" width="110" height="10" rx="5" fill="#e0e6f0"/>

  <!-- ¥ 符号 -->
  <text x="300" y="340" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="#1677ff" text-anchor="middle">¥</text>

  <!-- 笔尖小三角 -->
  <polygon points="385,410 405,440 375,435" fill="#1677ff"/>

  <!-- 右下角小圆点装饰 -->
  <circle cx="440" cy="440" r="12" fill="#ffffff" opacity="0.3"/>
</svg>
